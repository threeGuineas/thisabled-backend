services:
  app:
    build: .
    ports:
      # Funnel이 127.0.0.1:8000으로 프록시. 외부 직접 노출 차단(루프백 바인딩).
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: thisabled
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: thisabled
    # ports 제거: app이 Docker 내부 네트워크로 db:5432 접근 → 호스트 노출 불필요.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thisabled -d thisabled"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    # ports 제거: app이 redis:6379로 내부 접근. requirepass로 인증 강제.
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── AI 모델 서버 (AI 팀 담당) ──
  # app의 depends_on에 넣지 않는다: SAFE 장애 대응(§18.3) 시연을 위해 독립 기동.
  # ports 미노출 — app이 내부 네트워크로 safety-model:9001 / match-model:9002 접근.
  # 모델은 이미지에 없고 기동 시 HF private repo에서 다운로드(HF_TOKEN 필요) → hf_cache 볼륨에 캐싱.
  #
  # 롤백/장애 시연(§18.3 영상 폴백)용 mock — 삭제 금지. 실모델 문제 시 아래 주석 해제하고
  # 실모델 블록을 주석 처리한 뒤 `docker compose up -d safety-model match-model` 재기동.
  #   safety-model:
  #     build: .
  #     command: ["uvicorn", "mocks.safety_model:app", "--host", "0.0.0.0", "--port", "9001"]
  #     volumes:
  #       - ./mocks:/app/mocks
  #     restart: unless-stopped
  #   match-model:
  #     build: .
  #     command: ["uvicorn", "mocks.match_model:app", "--host", "0.0.0.0", "--port", "9002"]
  #     volumes:
  #       - ./mocks:/app/mocks
  #     restart: unless-stopped
  safety-model:
    build:
      context: ../thisabled-ai
      dockerfile: serving/safety_server/Dockerfile
    environment:
      SAFE_MODEL_DIR: soyuncj/thisabled-safety-kcelectra
      SAFE_MODEL_REVISION: ${SAFE_MODEL_REVISION:-}  # 특정 HF 커밋 핀 (빈값=main 최신)
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - hf_cache_safety:/srv/hf-cache
    restart: unless-stopped

  match-model:
    build:
      context: ../thisabled-ai
      dockerfile: serving/match_server/Dockerfile
    environment:
      MATCH_HF_REPO: soyuncj/thisabled-match-lambdamart
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - hf_cache_match:/srv/hf-cache
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
  hf_cache_safety:
  hf_cache_match:
